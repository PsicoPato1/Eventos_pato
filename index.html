<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Voice Cósmico Negro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div class="card">

        <h2>Inscrição 🎤</h2>

        <form id="form">

            <input type="text" name="nome" placeholder="Seu nome" required>
            <input type="text" name="id_jogo" placeholder="Seu ID no jogo" required>

            <button id="btn" type="submit">Enviar inscrição 🚀</button>

            <!-- spinner -->
            <div class="spinner" id="spinner"></div>

            <!-- mensagem -->
            <p id="status"></p>

        </form>

    </div>

</div>

<script>
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const status = document.getElementById("status");
const spinner = document.getElementById("spinner");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const data = new FormData(form);

    // 🔥 estado enviando
    btn.disabled = true;
    btn.innerText = "Enviando...";
    spinner.style.display = "block";
    status.innerText = "⏳ Enviando sua inscrição...";

    fetch("https://formspree.io/f/SEU_LINK_AQUI", {
        method: "POST",
        body: data,
        headers: {
            'Accept': 'application/json'
        }
    })
    .then(() => {

        spinner.style.display = "none";

        status.innerText = "✅ Inscrição enviada com sucesso!";
        btn.innerText = "Enviado ✔";

        form.reset();

        setTimeout(() => {
            window.location.href = "obrigado.html";
        }, 1500);

    })
    .catch(() => {
        spinner.style.display = "none";

        status.innerText = "❌ Erro ao enviar, tenta novamente";
        btn.disabled = false;
        btn.innerText = "Enviar inscrição 🚀";
    });
});
</script>

</body>
</html>
