<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<!-- 🔥 ISSO AQUI RESOLVE METADE DO PROBLEMA -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feedback Cósmico Negro</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  min-height: 100vh;
  background: url('fundo.png') no-repeat center;
  background-size: cover;

  display: flex;
  justify-content: center;
  align-items: center;

  padding: 20px;
}

/* 🔥 RESPONSIVO DE VERDADE */
.container {
  background: rgba(10,10,30,0.75);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 20px;

  width: 100%;
  max-width: 420px;

  color: white;
  box-shadow: 0 0 30px rgba(147,51,234,0.5);
}

h1 {
  text-align: center;
  color: #c084fc;
  text-shadow: 0 0 15px #9333ea;
  margin-bottom: 20px;
  font-size: 20px;
}

label {
  display: block;
  margin-top: 10px;
  font-size: 14px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 14px;
}

textarea {
  height: 90px;
  resize: none;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #9333ea, #4f46e5);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* LOADING */
button.loading {
  pointer-events: none;
  opacity: 0.7;
}

button.loading::after {
  content: " ⏳";
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { content: " ⏳"; }
  50% { content: " 🔄"; }
  100% { content: " ⏳"; }
}

#status {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
  opacity: 0;
  transition: 0.3s;
}
</style>
</head>

<body>

<div class="container">
  <h1>FEEDBACK CÓSMICO NEGRO</h1>

  <form id="formFeedback">

    <label>Nome do jogador</label>
    <input type="text" name="nome" required>


    <label>Tipo de sala / evento</label>
    <textarea name="tipo_sala"
      placeholder="Descreva o tipo de sala ou evento que você gostaria (ex: torneio, batalha espacial...)"
      required></textarea>

    <label>Melhor Horário Disponível</label>
    <select name="horario">
      <option>Manhã</option>
      <option>Tarde</option>
      <option>Noite</option>
    </select>

    <label>Sua opinião / sugestões</label>
    <textarea name="mensagem"
      placeholder="Fale sua opinião, ideias ou melhorias..."></textarea>

    <button type="submit" id="btnEnviar">Enviar Feedback 🚀</button>

    <div id="status">Enviando feedback...</div>

  </form>
</div>

<script>
const form = document.getElementById("formFeedback");
const btn = document.getElementById("btnEnviar");
const status = document.getElementById("status");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  btn.classList.add("loading");
  btn.innerText = "Enviando...";
  status.style.opacity = "1";

  fetch("https://formspree.io/f/xeepknzj", {
    method: "POST",
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  }).then(() => {

    form.reset();

    setTimeout(() => {
      window.location.href = "success.html";
    }, 1500);

  }).catch(() => {
    alert("Erro ao enviar.");
  });
});
</script>

</body>
</html>
